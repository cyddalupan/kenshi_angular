<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PWA Icon Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: #f8fafc;
    }
    .test-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin: 20px 0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border: 1px solid #e2e8f0;
    }
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }
    .icon-item {
      text-align: center;
      padding: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #f8fafc;
    }
    .icon-item img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      margin-bottom: 8px;
    }
    .status {
      padding: 10px;
      border-radius: 8px;
      margin: 10px 0;
    }
    .status.success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #10b981;
    }
    .status.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #ef4444;
    }
    .status.warning {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #f59e0b;
    }
  </style>
</head>
<body>
  <h1>🔍 PWA Icon Test</h1>
  
  <div class="test-card">
    <h2>📱 Manifest Icons</h2>
    <div id="manifest-status" class="status">Checking manifest...</div>
    
    <div class="icon-grid" id="manifest-icons">
      <!-- Manifest icons will be loaded here -->
    </div>
  </div>
  
  <div class="test-card">
    <h2>🍎 iOS Touch Icon</h2>
    <div id="ios-status" class="status">Checking iOS icon...</div>
    <div id="ios-icon" style="text-align: center; margin: 20px 0;">
      <!-- iOS icon will be loaded here -->
    </div>
  </div>
  
  <div class="test-card">
    <h2>🌐 Favicon</h2>
    <div id="favicon-status" class="status">Checking favicon...</div>
    <div id="favicon-icon" style="text-align: center; margin: 20px 0;">
      <!-- Favicon will be loaded here -->
    </div>
  </div>
  
  <div class="test-card">
    <h2>🔧 PWA Installation Status</h2>
    <div id="pwa-status" class="status">Checking PWA status...</div>
    <button id="install-btn" style="display: none; padding: 12px 24px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 10px 0;">
      📱 Install PWA
    </button>
  </div>
  
  <script>
    // Check manifest
    fetch('manifest.webmanifest')
      .then(response => response.json())
      .then(manifest => {
        const manifestStatus = document.getElementById('manifest-status');
        const manifestIcons = document.getElementById('manifest-icons');
        
        if (manifest.icons && manifest.icons.length > 0) {
          manifestStatus.className = 'status success';
          manifestStatus.innerHTML = `✅ Manifest found with ${manifest.icons.length} icons`;
          
          manifest.icons.forEach(icon => {
            const iconItem = document.createElement('div');
            iconItem.className = 'icon-item';
            iconItem.innerHTML = `
              <img src="${icon.src}" alt="${icon.sizes}" onerror="this.style.border='2px solid red'">
              <div style="font-size: 12px; color: #64748b;">${icon.sizes}</div>
            `;
            manifestIcons.appendChild(iconItem);
          });
        } else {
          manifestStatus.className = 'status error';
          manifestStatus.innerHTML = '❌ No icons found in manifest';
        }
      })
      .catch(error => {
        document.getElementById('manifest-status').className = 'status error';
        document.getElementById('manifest-status').innerHTML = `❌ Error loading manifest: ${error.message}`;
      });
    
    // Check iOS icon
    const iosIcon = document.getElementById('ios-icon');
    const iosStatus = document.getElementById('ios-status');
    const appleIcon = new Image();
    appleIcon.src = 'icons/apple-touch-icon.png';
    appleIcon.width = 120;
    appleIcon.height = 120;
    appleIcon.style.borderRadius = '20px';
    appleIcon.onload = () => {
      iosStatus.className = 'status success';
      iosStatus.innerHTML = '✅ iOS touch icon loaded successfully';
      iosIcon.appendChild(appleIcon);
      iosIcon.innerHTML += `<div style="margin-top: 10px; font-size: 14px; color: #64748b;">180×180 pixels</div>`;
    };
    appleIcon.onerror = () => {
      iosStatus.className = 'status error';
      iosStatus.innerHTML = '❌ iOS touch icon failed to load';
    };
    
    // Check favicon
    const faviconIcon = document.getElementById('favicon-icon');
    const faviconStatus = document.getElementById('favicon-status');
    const faviconImg = new Image();
    faviconImg.src = 'favicon.ico';
    faviconImg.width = 64;
    faviconImg.height = 64;
    faviconImg.onload = () => {
      faviconStatus.className = 'status success';
      faviconStatus.innerHTML = '✅ Favicon loaded successfully';
      faviconIcon.appendChild(faviconImg);
    };
    faviconImg.onerror = () => {
      faviconStatus.className = 'status warning';
      faviconStatus.innerHTML = '⚠️ Favicon may be .ico format (not displayable directly)';
      faviconIcon.innerHTML = '<div style="color: #64748b;">.ico files cannot be displayed directly in img tags</div>';
    };
    
    // Check PWA status
    const pwaStatus = document.getElementById('pwa-status');
    const installBtn = document.getElementById('install-btn');
    
    const isPWA = window.matchMedia('(display-mode: standalone)').matches;
    
    if (isPWA) {
      pwaStatus.className = 'status success';
      pwaStatus.innerHTML = '✅ PWA is installed and running in standalone mode';
    } else {
      pwaStatus.className = 'status warning';
      pwaStatus.innerHTML = '⚠️ PWA is not installed. You can install it using the button below.';
      installBtn.style.display = 'block';
    }
    
    // PWA install prompt
    let deferredPrompt;
    
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'block';
    });
    
    installBtn.addEventListener('click', () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome === 'accepted') {
            pwaStatus.className = 'status success';
            pwaStatus.innerHTML = '✅ PWA installation started!';
            installBtn.style.display = 'none';
          }
          deferredPrompt = null;
        });
      }
    });
    
    // Check service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistration()
        .then(registration => {
          if (registration) {
            console.log('Service Worker registered:', registration);
          } else {
            console.log('No Service Worker registered');
          }
        });
    }
  </script>
</body>
</html>
