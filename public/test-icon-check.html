<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PWA Icon Test - Check Skeleton Icons</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: #f8fafc;
      color: #1e293b;
    }
    h1 {
      color: #4f46e5;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 10px;
    }
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
      margin: 30px 0;
    }
    .icon-item {
      background: white;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      border: 1px solid #e2e8f0;
    }
    .icon-img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      margin: 0 auto 10px;
      display: block;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #f1f5f9;
    }
    .icon-label {
      font-size: 14px;
      color: #64748b;
      margin: 5px 0;
    }
    .status {
      padding: 10px;
      border-radius: 6px;
      margin: 10px 0;
      font-weight: 500;
    }
    .status-success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }
    .status-error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    .manifest-check {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      padding: 15px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <h1>🔍 PWA Skeleton Icon Test</h1>
  
  <div class="manifest-check">
    <h3>📄 Manifest Check</h3>
    <p><strong>Manifest URL:</strong> <a href="manifest.webmanifest" target="_blank">manifest.webmanifest</a></p>
    <p><strong>Current Theme:</strong> Skeleton (should show skeleton image)</p>
    <p><strong>Icon Count:</strong> 8 sizes configured</p>
  </div>
  
  <h2>🖼️ Icon Files Check</h2>
  
  <div class="icon-grid" id="iconGrid">
    <!-- Icons will be loaded dynamically -->
  </div>
  
  <h2>📱 PWA Installation Test</h2>
  <div id="pwaStatus" class="status">Checking PWA status...</div>
  
  <script>
    // Icon files to check
    const iconFiles = [
      { src: 'icons/icon-72x72.png', label: '72×72' },
      { src: 'icons/icon-96x96.png', label: '96×96' },
      { src: 'icons/icon-128x128.png', label: '128×128' },
      { src: 'icons/icon-144x144.png', label: '144×144' },
      { src: 'icons/icon-152x152.png', label: '152×152' },
      { src: 'icons/icon-192x192.png', label: '192×192' },
      { src: 'icons/icon-384x384.png', label: '384×384' },
      { src: 'icons/icon-512x512.png', label: '512×512' },
      { src: 'icons/apple-touch-icon.png', label: 'iOS 180×180' },
      { src: 'favicon.ico', label: 'Favicon .ico' }
    ];
    
    const iconGrid = document.getElementById('iconGrid');
    
    // Load and display each icon
    iconFiles.forEach(icon => {
      const div = document.createElement('div');
      div.className = 'icon-item';
      
      const img = document.createElement('img');
      img.className = 'icon-img';
      img.src = icon.src;
      img.alt = icon.label;
      img.onload = () => {
        div.innerHTML += `<div class="icon-label">✅ ${icon.label}</div>`;
      };
      img.onerror = () => {
        div.innerHTML += `<div class="icon-label" style="color: #ef4444;">❌ ${icon.label} - Missing</div>`;
      };
      
      div.appendChild(img);
      iconGrid.appendChild(div);
    });
    
    // Check PWA status
    const pwaStatus = document.getElementById('pwaStatus');
    
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistration()
        .then(registration => {
          if (registration) {
            pwaStatus.innerHTML = '<div class="status status-success">✅ Service Worker Registered - PWA Ready</div>';
          } else {
            pwaStatus.innerHTML = '<div class="status status-error">⚠️ Service Worker Not Registered</div>';
          }
        })
        .catch(err => {
          pwaStatus.innerHTML = `<div class="status status-error">❌ Error: ${err.message}</div>`;
        });
    } else {
      pwaStatus.innerHTML = '<div class="status status-error">❌ Service Workers Not Supported</div>';
    }
    
    // Check manifest
    if ('serviceWorker' in navigator && window.matchMedia('(display-mode: standalone)').matches) {
      console.log('Running in standalone PWA mode');
    }
  </script>
</body>
</html>
