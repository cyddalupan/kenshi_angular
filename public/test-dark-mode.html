<!DOCTYPE html>
<html>
<head><title>Dark Mode Test</title></head>
<body style="font-family: sans-serif; padding: 20px;">
    <h1>Dark Mode Test</h1>
    <p>Current prefers-color-scheme: <span id="mode">detecting...</span></p>
    <div style="background: #007AFF; color: white; padding: 20px; margin: 20px 0;">
        This should be blue in light mode, darker in dark mode
    </div>
    <script>
        const mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.getElementById('mode').textContent = mode;
        document.body.style.background = mode === 'dark' ? '#000' : '#fff';
        document.body.style.color = mode === 'dark' ? '#fff' : '#000';
    </script>
</body>
</html>
