<!DOCTYPE html>
<html>
<head>
    <title>Angular/Ionic Diagnostic Fix</title>
    <style>
        .status { padding: 10px; margin: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
    <h1>Angular/Ionic Bootstrap Diagnostic</h1>
    
    <div id="status"></div>
    
    <h2>Test 1: Basic JavaScript</h2>
    <div id="test1" class="status">Testing...</div>
    
    <h2>Test 2: Zone.js Loading</h2>
    <div id="test2" class="status">Testing...</div>
    
    <h2>Test 3: Angular Bootstrap</h2>
    <div id="test3" class="status">Testing...</div>
    
    <h2>Test 4: Ionic Components</h2>
    <div id="test4" class="status">Testing...</div>
    
    <script>
        function logStatus(id, message, type = 'info') {
            const div = document.getElementById(id);
            div.innerHTML = message;
            div.className = `status ${type}`;
            console.log(`${type.toUpperCase()}: ${message}`);
        }
        
        // Test 1: Basic JavaScript
        logStatus('test1', '✅ Basic JavaScript is working', 'success');
        
        // Test 2: Check for Zone.js
        setTimeout(() => {
            if (window.Zone && window.Zone.current) {
                logStatus('test2', `✅ Zone.js loaded: ${window.Zone.current.name}`, 'success');
            } else {
                logStatus('test2', '❌ Zone.js NOT loaded - Angular cannot bootstrap', 'error');
            }
        }, 100);
        
        // Test 3: Check Angular bootstrap
        setTimeout(() => {
            // Look for Angular root element
            const appRoot = document.querySelector('app-root');
            if (appRoot) {
                // Check if Angular has rendered anything inside
                if (appRoot.children.length > 0) {
                    logStatus('test3', '✅ Angular app-root has content', 'success');
                } else {
                    logStatus('test3', '⚠️ app-root exists but is empty - Angular may not have bootstrapped', 'warning');
                    
                    // Try to manually check if Angular is in window
                    if (window.ng && window.ng.core) {
                        logStatus('test3', '✅ Angular core is loaded in window.ng', 'success');
                    } else {
                        logStatus('test3', 'ℹ️ Angular not found in window.ng (may be bundled)', 'info');
                    }
                }
            } else {
                logStatus('test3', '❌ app-root element not found', 'error');
            }
        }, 500);
        
        // Test 4: Check Ionic
        setTimeout(() => {
            // Check for Ionic custom elements
            if (window.customElements) {
                // Check if ion-app is defined
                customElements.whenDefined('ion-app').then(() => {
                    logStatus('test4', '✅ ion-app custom element is defined', 'success');
                }).catch(() => {
                    logStatus('test4', '❌ ion-app custom element NOT defined', 'error');
                });
            } else {
                logStatus('test4', '❌ Custom Elements API not supported', 'error');
            }
        }, 1000);
        
        // Listen for errors
        window.addEventListener('error', (e) => {
            logStatus('status', `❌ JavaScript Error: ${e.message}`, 'error');
        });
        
        // Check after everything loads
        window.addEventListener('load', () => {
            setTimeout(() => {
                // Final check
                const appRoot = document.querySelector('app-root');
                const status = document.getElementById('status');
                
                if (appRoot && appRoot.children.length > 0) {
                    status.innerHTML = '✅ SUCCESS: Angular app is rendering!';
                    status.className = 'status success';
                } else {
                    status.innerHTML = '❌ ISSUE: Angular app not rendering. Check tests above.';
                    status.className = 'status error';
                }
            }, 2000);
        });
    </script>
    
    <!-- Load the actual Angular app -->
    <script src="runtime.3e5ce1b38fb398e6.js" type="module"></script>
    <script src="polyfills.a74359f16197e9f4.js" type="module"></script>
    <script src="main.8eed74eb3d9c7e97.js" type="module"></script>
</body>
</html>
